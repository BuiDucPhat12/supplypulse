name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run black --check .
      - run: uv run pytest tests/ -q

  pipeline:
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: supplypulse
      POSTGRES_PASSWORD: supplypulse123
      POSTGRES_DB: supplypulse
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: supplypulse
          POSTGRES_PASSWORD: supplypulse123
          POSTGRES_DB: supplypulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U supplypulse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - name: Create bronze schema
        run: PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -f sql/bronze/create_tables.sql
      - name: Generate synthetic data
        run: uv run python scripts/generate_synthetic_data.py
      - name: Load bronze
        run: uv run python scripts/load_bronze.py
      - name: dbt build (73 resources)
        run: cd supplypulse_dbt && uv run dbt deps && uv run dbt build --profiles-dir ../profiles --target local
      - name: dbt docs generate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd supplypulse_dbt && uv run dbt docs generate --static --profiles-dir ../profiles --target local
          mkdir -p ../_site && cp target/static_index.html ../_site/index.html
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-docs:
    needs: pipeline
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
